name: thewealth-infra

services:
  nats:
    image: nats:2.10
    container_name: thewealth-nats
    command: [ "-c", "/etc/nats/nats-server.conf" ]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - ./src/infrastructure/nats/nats-server.conf:/etc/nats/nats-server.conf:ro
      - natsdata:/data
    healthcheck:
      test: [ "CMD", "nats-server", "--signal", "reload=1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  postgres:
    image: postgres:16
    container_name: thewealth-postgres
    environment:
      POSTGRES_USER: thewealth
      POSTGRES_PASSWORD: thewealth
      POSTGRES_DB: thewealth
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U thewealth -d thewealth" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: thewealth-timescale
    environment:
      POSTGRES_USER: thewealth
      POSTGRES_PASSWORD: thewealth
      POSTGRES_DB: market
    ports:
      - "5433:5432"
    volumes:
      - tsdata:/var/lib/postgresql/data
      - ./src/infrastructure/timescaledb/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U thewealth -d market" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7
    container_name: thewealth-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  natsdata:
  pgdata:
  tsdata:
  redisdata:
